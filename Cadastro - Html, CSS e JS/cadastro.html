<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>
<div class="container">
    <h2 id="titulo">Cadastro de Usuário</h2>

    <form id="usuarioForm">
        <input type="hidden" id="id">

        <div class="form-group">
        <label>Foto de Perfil</label>
        <input type="file" id="fotoInput" accept="image/*"> <img id="preview" src=""
        style="display:none; width: 100px; margin-top: 10px; border-radius: 50%;">
        </div> 
        <div class="form-group">
            <label>Nome</label>
            <input type="text" id="nome" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="form-group" id="grupoSenha">
            <label>Senha</label>
            <input type="password" id="senha">
        </div>

        <div class="form-group">
            <label>Perfil</label>
            <select id="perfil">
                <option value="USER">USER</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </div>

        <div class="form-group">
            <label>Endereço</label>
            <input type="text" id="endereco">
        </div>

        <div class="form-group">
            <label>Bairro</label>
            <input type="text" id="bairro">
        </div>

        <div class="form-group">
            <label>Complemento</label>
            <input type="text" id="complemento">
        </div>

        <div class="form-group">
            <label>CEP</label>
            <input type="text" id="cep">
        </div>

        <div class="form-group">
            <label>Cidade</label>
            <input type="text" id="cidade">
        </div>

        <div class="form-group">
            <label>Estado</label>
            <input type="text" id="estado">
        </div>

        <button type="submit" id="btnSalvar">Salvar Usuário</button>
    </form>

    <div id="mensagem" class="mensagem"></div>
</div>

<script src="js/cadastro.js"></script>
</body>
</html>
